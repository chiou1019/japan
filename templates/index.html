<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日文 N5 單字學習</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Shippori+Mincho:wght@400;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="ink-bg"></div>
<div class="app">

  <!-- Header -->
  <header class="site-header">
    <div class="header-kana">日本語</div>
    <div class="header-right">
      <span class="n5-badge">N5</span>
      <div class="streak-display" id="streakDisplay" style="display:none">
        <span>🔥</span><span id="streakCount">0</span>
      </div>
      <button class="btn-tts-toggle" id="btnTTS" onclick="toggleTTS()" title="語音開關">🔊</button>
    </div>
  </header>

  <!-- 語音設定列 -->
  <div class="tts-bar" id="ttsBar" style="display:none">
    <span class="tts-label">語音</span>
    <select class="tts-select" id="voiceSelect" onchange="onVoiceChange(this)"></select>
    <span class="tts-label">語速</span>
    <input class="tts-range" type="range" min="0.5" max="1.5" step="0.1" value="0.85" oninput="onRateChange(this.value)">
    <span id="rateLabel" class="tts-rate-label">0.85x</span>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-pill known"><span id="statKnown">0</span><label>記住</label></div>
    <div class="stat-pill unknown"><span id="statUnknown">0</span><label>不會</label></div>
    <div class="stat-pill total"><span id="statTotal">0</span><label>總練習</label></div>
    <div class="stat-pill rate"><span id="statRate">—</span><label>正確率</label></div>
  </div>

  <!-- ── SETUP ── -->
  <section class="screen" id="screenSetup">
    <div class="setup-card">
      <p class="setup-label">今天要練習幾個單字？</p>
      <div class="count-grid">
        <button class="cnt" data-n="5"   onclick="pickCount(this)">5</button>
        <button class="cnt" data-n="10"  onclick="pickCount(this)">10</button>
        <button class="cnt active" data-n="15" onclick="pickCount(this)">15</button>
        <button class="cnt" data-n="20"  onclick="pickCount(this)">20</button>
        <button class="cnt" data-n="30"  onclick="pickCount(this)">30</button>
        <button class="cnt" data-n="40"  onclick="pickCount(this)">40</button>
        <button class="cnt" data-n="50"  onclick="pickCount(this)">50</button>
        <button class="cnt" data-n="70"  onclick="pickCount(this)">70</button>
        <button class="cnt" data-n="100" onclick="pickCount(this)">100</button>
        <button class="cnt" data-n="200" onclick="pickCount(this)">200</button>
      </div>
      <button class="btn-start" onclick="startLearning()">開始學習</button>
    </div>
  </section>

  <!-- ── STUDY ── -->
  <section class="screen" id="screenStudy" style="display:none">

    <div class="progress-row">
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
      <span class="prog-label" id="progLabel">0 / 0</span>
    </div>

    <div class="queue-row">
      <span id="queueInfo" class="queue-info-text">剩餘 0 張</span>
      <div class="queue-tags">
        <span class="tag tag-unknown" id="tagUnknown">⚠ 待複習 0</span>
        <span class="tag tag-done"    id="tagDone">✓ 完成 0</span>
      </div>
    </div>

    <!-- 學習主區域：卡片 + 白板並排 -->
    <div class="study-layout">

      <!-- 左：閃卡區 -->
      <div class="card-col">

        <!-- 卡片（只顯示單字） -->
        <div class="card-scene">
          <div class="card" id="card">
            <div class="card-front-only">
              <div class="card-corner top-left">N5</div>
              <div class="card-corner bottom-right" id="frontNum"></div>
              <!-- 朗讀單字按鈕（大字） -->
              <button class="word-speak-btn" id="btnSpeakWord" onclick="speakWord()">
                <span class="front-word" id="frontWord">—</span>
                <span class="speak-icon">🔊</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 顯示假名 / 顯示中文 按鈕 -->
        <div class="reveal-row">
          <button class="btn-reveal reading" id="btnRevealReading" onclick="revealReading()">
            👁 顯示假名
          </button>
          <button class="btn-reveal meaning" id="btnRevealMeaning" onclick="revealMeaning()">
            👁 顯示中文
          </button>
        </div>

        <!-- 顯示區域 -->
        <div class="reveal-display">
          <div class="reveal-item reading-item" id="revealReading"></div>
          <div class="reveal-sep" id="revealSep" style="display:none">／</div>
          <div class="reveal-item meaning-item" id="revealMeaning"></div>
        </div>

        <!-- 朗讀假名按鈕（顯示假名後才出現） -->
        <div class="speak-row">
          <button class="btn-speak" id="btnSpeakWord2" onclick="speakWord()">🔊 朗讀單字</button>
          <button class="btn-speak" id="btnSpeakReading" onclick="speakReading()">🔊 朗讀假名</button>
        </div>

        <!-- 判斷按鈕 -->
        <div class="action-row">
          <button class="action-btn btn-unknown" id="btnUnknown" onclick="markUnknown()" disabled>
            <span class="act-icon">✗</span>
            <span class="act-label">還不會</span>
            <span class="act-sub">下次再練</span>
          </button>
          <button class="action-btn btn-known" id="btnKnown" onclick="markKnown()" disabled>
            <span class="act-icon">✓</span>
            <span class="act-label">記住了！</span>
            <span class="act-sub">今天完成</span>
          </button>
        </div>

      </div><!-- /card-col -->

      <!-- 右：白板 -->
      <div class="wb-col">
        <div class="wb-header">
          <span class="wb-title">✏ 練習白板</span>
          <button class="wb-clear-btn" onclick="clearWhiteboard()">清除</button>
        </div>

        <!-- 工具列 -->
        <div class="wb-toolbar">
          <button class="wb-color active" data-color="#e4e4ef" onclick="setWbColor('#e4e4ef')" style="background:#e4e4ef"></button>
          <button class="wb-color" data-color="#f87171" onclick="setWbColor('#f87171')" style="background:#f87171"></button>
          <button class="wb-color" data-color="#4ade80" onclick="setWbColor('#4ade80')" style="background:#4ade80"></button>
          <button class="wb-color" data-color="#60a5fa" onclick="setWbColor('#60a5fa')" style="background:#60a5fa"></button>
          <button class="wb-color" data-color="#fbbf24" onclick="setWbColor('#fbbf24')" style="background:#fbbf24"></button>
          <div class="wb-sep"></div>
          <button class="wb-tool-btn" id="btnErase" onclick="toggleErase()" title="橡皮擦">◻</button>
          <div class="wb-sep"></div>
          <span class="wb-size-label">粗細</span>
          <input type="range" min="2" max="20" value="4" oninput="setWbSize(this.value)" class="wb-size-range">
          <span id="wbSizeLabel" class="wb-size-val">4px</span>
        </div>

        <!-- 畫布 -->
        <div class="wb-canvas-wrap">
          <canvas id="wbCanvas"></canvas>
          <div class="wb-placeholder">在這裡練習寫字</div>
        </div>
      </div><!-- /wb-col -->

    </div><!-- /study-layout -->

  </section>

  <!-- ── COMPLETE ── -->
  <section class="screen" id="screenComplete" style="display:none">
    <div class="complete-wrap">
      <div class="complete-kanji">完了</div>
      <h2 class="complete-title">練習完成！</h2>
      <p class="complete-sub" id="completeSub"></p>
      <div class="result-grid">
        <div class="result-box known"><div class="res-num" id="resKnown">0</div><div class="res-label">✓ 記住了</div></div>
        <div class="result-box unknown"><div class="res-num" id="resUnknown">0</div><div class="res-label">✗ 還不會</div></div>
        <div class="result-box streak"><div class="res-num" id="resStreak">0</div><div class="res-label">🔥 最長連勝</div></div>
        <div class="result-box rate"><div class="res-num" id="resRate">—</div><div class="res-label">正確率</div></div>
      </div>
      <div class="complete-btns">
        <button class="btn-retry" id="btnRetry" onclick="retryUnknown()">
          🔄 只練「還不會」的<span id="unknownCount"></span>
        </button>
        <button class="btn-restart" onclick="backToSetup()">← 重新選擇</button>
      </div>
    </div>
  </section>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
